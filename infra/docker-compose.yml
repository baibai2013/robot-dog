services:

  # ── 数据库 ─────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sh:/docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Gitea (自托管 GitHub) ──────────────────────────────────────────────────
  gitea:
    image: gitea/gitea:1.22
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"   # Web UI
      - "222:22"      # SSH Git
    environment:
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=postgres:5432
      - GITEA__database__NAME=gitea
      - GITEA__database__USER=admin
      - GITEA__database__PASSWD=${POSTGRES_PASSWORD}
      - GITEA__server__DOMAIN=localhost
      - GITEA__server__ROOT_URL=http://localhost:3000
      - GITEA__server__HTTP_PORT=3000
      - GITEA__webhook__ALLOWED_HOST_LIST=*
      - GITEA__security__INSTALL_LOCK=true
      - GITEA__service__DISABLE_REGISTRATION=false
    volumes:
      - gitea_data:/data

  # ── Mattermost (自托管 Slack) ──────────────────────────────────────────────
  mattermost:
    image: mattermost/mattermost-team-edition:9.11
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8065:8065"
    environment:
      - MM_SQLSETTINGS_DRIVERNAME=postgres
      - MM_SQLSETTINGS_DATASOURCE=postgres://admin:${POSTGRES_PASSWORD}@postgres:5432/mattermost?sslmode=disable
      - MM_SERVICESETTINGS_SITEURL=http://localhost:8065
      - MM_SERVICESETTINGS_ENABLEBOTACCOUNTCREATION=true
      - MM_SERVICESETTINGS_ENABLEINCOMINGWEBHOOKS=true
      - MM_SERVICESETTINGS_ENABLEOUTGOINGWEBHOOKS=true
      - MM_SERVICESETTINGS_ENABLESLASHCOMMANDS=true
      - MM_PLUGINSETTINGS_ENABLE=true
    volumes:
      - mattermost_data:/mattermost/data
      - mattermost_logs:/mattermost/logs
      - mattermost_plugins:/mattermost/plugins

  # ── n8n (自动化枢纽) ────────────────────────────────────────────────────────
  n8n:
    image: docker.n8n.io/n8nio/n8n:1.56.1
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=admin
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - WEBHOOK_URL=http://localhost:5678
      - GENERIC_TIMEZONE=Asia/Shanghai
    volumes:
      - n8n_data:/home/node/.n8n

  # ── Agent Worker (Claude API 执行层) ───────────────────────────────────────
  agent-worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.agent
    restart: unless-stopped
    depends_on:
      - gitea
      - mattermost
    ports:
      - "8080:8080"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GITEA_URL=http://gitea:3000
      - GITEA_TOKEN=${GITEA_TOKEN}
      - GITEA_USER=${GITEA_USER}
      - GITEA_REPO=robot-dog
      - MATTERMOST_URL=http://mattermost:8065
      - MATTERMOST_TOKEN=${MATTERMOST_TOKEN}
      - WORKSPACE=/workspace
    volumes:
      - ../:/workspace

  # ── Dashboard (状态看板) ──────────────────────────────────────────────────
  dashboard:
    build:
      context: ..
      dockerfile: infra/Dockerfile.agent
    restart: unless-stopped
    ports:
      - "8888:8888"
    command: python system/dashboard.py
    volumes:
      - ../:/workspace

volumes:
  postgres_data:
  gitea_data:
  mattermost_data:
  mattermost_logs:
  mattermost_plugins:
  n8n_data:

networks:
  default:
    name: robot-dog-net
